<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcase</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .slideshow-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps the aspect ratio. Change to "cover" if you want it to stretch to fill the screen completely */
        }

        /* Fade animation */
        .fade {
            animation: fadeEffect 1s;
        }

        @keyframes fadeEffect {
            from { opacity: 0.4; } 
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide fade">
            <img src="screenshot (1).jpg" alt="Slide 1">
        </div>
        <div class="slide fade">
            <img src="screenshot (2).jpg" alt="Slide 2">
        </div>
        <div class="slide fade">
            <img src="screenshot (3).jpg" alt="Slide 3">
        </div>
        <div class="slide fade">
            <img src="screenshot (4).jpg" alt="Slide 3">
        </div>
        <div class="slide fade">
            <img src="screenshot (5).jpg" alt="Slide 3">
        </div>
        <div class="slide fade">
            <img src="screenshot (6).jpg" alt="Slide 3">
        </div>
        <div class="slide fade">
            <img src="screenshot (7).jpg" alt="Slide 3">
        </div>
        <div class="slide fade">
            <img src="screenshot (8).jpg" alt="Slide 3">
        </div>
        <div class="slide fade">
            <img src="screenshot (9).jpg" alt="Slide 3">
        </div>
    </div>

    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("slide");
            
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }    
            
            slides[slideIndex - 1].style.display = "block";  
            
            // Changes the image every 3000 milliseconds (3 seconds)
            setTimeout(showSlides, 3000); 
        }
    </script>

</body>
</html>
